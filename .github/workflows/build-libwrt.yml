name: Build LIBWRT

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "LIBWRT branch"
        required: true
        default: "25.12-nss"

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TARGET: qualcommax
      SUBTARGET: ipq60xx
      DEVICE_PROFILE: jdcloud_re-cs-02
      PROFILE_SYM: jdcloud_re_cs_02
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            flex gawk gcc-multilib g++-multilib genisoimage git gperf haveged \
            help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs \
            msmtp ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-pyelftools python3-setuptools qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev

      - name: Clone source
        run: |
          git clone -b "${{ inputs.branch }}" --depth 1 --single-branch \
            https://github.com/LiBwrt/openwrt-6.x.git libwrt

      - name: Update feeds
        working-directory: libwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        working-directory: libwrt
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${PROFILE_SYM}=y
          EOF
          make defconfig

      - name: Download package sources
        working-directory: libwrt
        run: make -j"$(nproc)" download V=s

      - name: Build firmware
        working-directory: libwrt
        run: make -j"$(nproc)" V=s

      - name: Verify target profile exists
        working-directory: libwrt
        run: |
          set -e
          PROFILE_RAW="${DEVICE_PROFILE}"
          TARGET_DIR="bin/targets/${TARGET}/${SUBTARGET}"
          PROFILE_JSON="$TARGET_DIR/profiles.json"
          if [ ! -f "$PROFILE_JSON" ]; then
            echo "profiles.json not found: $PROFILE_JSON"
            exit 1
          fi
          python3 -c "import json,os,sys; p=os.environ['PROFILE_RAW']; pj=os.environ['PROFILE_JSON']; d=json.load(open(pj,'r',encoding='utf-8')); ps=d.get('profiles',{}); print('Profile found:', p) if p in ps else (print(f\"Requested profile '{p}' not found in profiles.json\"), print('Available profiles sample:', ', '.join(list(ps.keys())[:30])), sys.exit(1))"
        env:
          PROFILE_RAW: ${{ env.DEVICE_PROFILE }}
          PROFILE_JSON: bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/profiles.json

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libwrt-${{ inputs.branch }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.DEVICE_PROFILE }}
          path: libwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*
          if-no-files-found: error

      - name: Prepare release files
        id: release_meta
        run: |
          set -e
          TARGET_DIR="libwrt/bin/targets/${TARGET}/${SUBTARGET}"
          RELEASE_DIR="release"
          mkdir -p "$RELEASE_DIR"

          BUILD_TIME="$(date -u +%Y%m%d-%H%M%S)"
          TAG="libwrt-${{ inputs.branch }}-${TARGET}-${SUBTARGET}-${PROFILE_SYM}-${BUILD_TIME}"
          ARCHIVE_NAME="${TAG}.tar.gz"

          tar -C "$TARGET_DIR" -czf "$RELEASE_DIR/$ARCHIVE_NAME" .
          cp "$TARGET_DIR/sha256sums" "$RELEASE_DIR/sha256sums" || true
          cp "$TARGET_DIR/"*.buildinfo "$RELEASE_DIR/" || true
          cp "$TARGET_DIR/profiles.json" "$RELEASE_DIR/profiles.json" || true

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            Branch: `${{ inputs.branch }}`
            Target: `${{ env.TARGET }}/${{ env.SUBTARGET }}`
            Device: `${{ env.DEVICE_PROFILE }}`
            Run: `${{ github.run_number }}`
          files: |
            release/*
