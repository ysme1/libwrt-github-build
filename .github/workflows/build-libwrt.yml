name: Build LIBWRT

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "LIBWRT branch"
        required: true
        default: "25.12-nss"
      target:
        description: "Target system"
        required: true
        default: "qualcommax"
      subtarget:
        description: "Subtarget"
        required: true
        default: "ipq60xx"
      device_profile:
        description: "Device profile suffix (e.g. jdcloud_ax6600)"
        required: true
        default: "jdcloud_re-cs-02"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            flex gawk gcc-multilib g++-multilib genisoimage git gperf haveged \
            help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs \
            msmtp ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-pyelftools python3-setuptools qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev

      - name: Clone source
        run: |
          git clone -b "${{ inputs.branch }}" --depth 1 --single-branch \
            https://github.com/LiBwrt/openwrt-6.x.git libwrt

      - name: Update feeds
        working-directory: libwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        id: gen_config
        working-directory: libwrt
        run: |
          # OpenWrt config symbols use underscores; allow users to input either '-' or '_'.
          PROFILE_SYM="$(echo "${{ inputs.device_profile }}" | tr '-' '_')"
          cat > .config <<EOF
          CONFIG_TARGET_${{ inputs.target }}=y
          CONFIG_TARGET_${{ inputs.target }}_${{ inputs.subtarget }}=y
          CONFIG_TARGET_${{ inputs.target }}_${{ inputs.subtarget }}_DEVICE_${PROFILE_SYM}=y
          EOF
          make defconfig
          echo "profile_sym=${PROFILE_SYM}" >> "$GITHUB_OUTPUT"

      - name: Download package sources
        working-directory: libwrt
        run: make -j"$(nproc)" download V=s

      - name: Build firmware
        working-directory: libwrt
        run: make -j"$(nproc)" V=s

      - name: Verify target profile exists
        working-directory: libwrt
        run: |
          set -e
          PROFILE_RAW="${{ inputs.device_profile }}"
          TARGET_DIR="bin/targets/${{ inputs.target }}/${{ inputs.subtarget }}"
          PROFILE_JSON="$TARGET_DIR/profiles.json"
          if [ ! -f "$PROFILE_JSON" ]; then
            echo "profiles.json not found: $PROFILE_JSON"
            exit 1
          fi
          python3 - <<'PY'
import json, os, sys
profile = os.environ["PROFILE_RAW"]
pj = os.environ["PROFILE_JSON"]
with open(pj, "r", encoding="utf-8") as f:
    data = json.load(f)
profiles = data.get("profiles", {})
if profile not in profiles:
    print(f"Requested profile '{profile}' not found in profiles.json")
    print("Available profiles sample:", ", ".join(list(profiles.keys())[:30]))
    sys.exit(1)
print(f"Profile found: {profile}")
PY
        env:
          PROFILE_RAW: ${{ inputs.device_profile }}
          PROFILE_JSON: bin/targets/${{ inputs.target }}/${{ inputs.subtarget }}/profiles.json

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libwrt-${{ inputs.branch }}-${{ inputs.target }}-${{ inputs.subtarget }}-${{ inputs.device_profile }}
          path: libwrt/bin/targets/${{ inputs.target }}/${{ inputs.subtarget }}/*
          if-no-files-found: error

      - name: Prepare release files
        id: release_meta
        run: |
          set -e
          TARGET_DIR="libwrt/bin/targets/${{ inputs.target }}/${{ inputs.subtarget }}"
          RELEASE_DIR="release"
          mkdir -p "$RELEASE_DIR"

          BUILD_TIME="$(date -u +%Y%m%d-%H%M%S)"
          TAG="libwrt-${{ inputs.branch }}-${{ inputs.target }}-${{ inputs.subtarget }}-${{ steps.gen_config.outputs.profile_sym }}-${BUILD_TIME}"
          ARCHIVE_NAME="${TAG}.tar.gz"

          tar -C "$TARGET_DIR" -czf "$RELEASE_DIR/$ARCHIVE_NAME" .
          cp "$TARGET_DIR/sha256sums" "$RELEASE_DIR/sha256sums" || true
          cp "$TARGET_DIR/"*.buildinfo "$RELEASE_DIR/" || true
          cp "$TARGET_DIR/profiles.json" "$RELEASE_DIR/profiles.json" || true

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            Branch: `${{ inputs.branch }}`
            Target: `${{ inputs.target }}/${{ inputs.subtarget }}`
            Device: `${{ inputs.device_profile }}`
            Run: `${{ github.run_number }}`
          files: |
            release/*
